name: lawallet_pos
description: LaWallet native Android POS — Lightning/Nostr point of sale for Ciontek CS30Pro.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management (replaces the 6 React contexts)
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.0
  web_socket_channel: ^3.0.0

  # Nostr / Lightning crypto
  # NOTE: the NIP-57 client is prototyped in M0; if `ndk`/`nostr` packages don't
  # cleanly support zap request/receipt + relay-set confirmation, we drop to a thin
  # custom client over web_socket_channel + bip340 (see docs/PROTOCOL.md).
  bip340: ^1.0.4
  crypto: ^3.0.3
  pointycastle: ^3.9.1
  bech32: ^0.2.2
  convert: ^3.1.1

  # Bolt11 invoice decode
  bolt11_decoder: ^1.0.3

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # QR + camera
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  # UI
  confetti: ^0.8.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/categories.json
    - assets/menus/
    - assets/images/
