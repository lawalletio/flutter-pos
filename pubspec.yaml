name: lawallet_pos
description: LaWallet native Android POS — Lightning/Nostr point of sale for Ciontek CS30Pro.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management (replaces the 6 React contexts)
  flutter_riverpod: ^3.3.2

  # Routing
  go_router: ^17.3.0

  # Networking
  dio: ^5.10.0
  web_socket_channel: ^3.0.3

  # Nostr / Lightning crypto
  # NOTE: the NIP-57 client is prototyped in M0; if the packages below don't
  # cleanly support zap request/receipt + relay-set confirmation, we drop to a thin
  # custom client over web_socket_channel + bip340 (see docs/PROTOCOL.md).
  bip340: ^0.3.1
  crypto: ^3.0.7
  pointycastle: ^4.0.0
  bech32: ^0.2.2
  convert: ^3.1.2

  # Bolt11 invoice decode
  bolt11_decoder: ^1.0.2

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.5

  # QR + camera
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0

  # UI
  confetti: ^0.8.0

  # Utils
  uuid: ^4.5.3
  intl: 0.20.2
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # hive_generator + build_runner are added back in M2 (compatible pins) when
  # @HiveType storage models exist; omitted now to avoid a build/build_runner conflict.

flutter:
  uses-material-design: true
  assets:
    - assets/categories.json
    - assets/menus/
    - assets/images/
